<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nexus | Tactical AI Career Advisor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- TABBED DASHBOARD OVERRIDES --- */
        :root {
            --dashboard-width: 1400px;
        }

        .app-container .container {
            max-width: var(--dashboard-width) !important;
            width: 95% !important;
            margin: 0 auto;
        }

        /* Tab Navigation */
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1f3657;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #1f3657;
            color: var(--text-muted-color);
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            font-family: var(--font-family);
            font-weight: 600;
            border-radius: 5px 5px 0 0;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--surface-color);
            border-color: var(--primary-color);
            color: var(--success-color);
            border-bottom: 2px solid var(--success-color);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 40/60 Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (min-width: 1100px) {
            .dashboard-grid {
                grid-template-columns: 4fr 6fr !important; 
            }
        }

        .input-form-card, .output-plan-card {
            min-height: 700px;
            display: flex;
            flex-direction: column;
        }

        #chat-window {
            flex-grow: 1;
            min-height: 450px;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="container">
            <a href="#" class="logo">PROJECT NEXUS</a>
        </div>
    </header>

    <section class="hero" style="padding-top: 120px; padding-bottom: 1rem;">
        <div class="container">
            <h1>Mission Control</h1>
        </div>
    </section>

    <div class="app-container">
        <div class="container">
            
            <!-- TAB NAVIGATION -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="openTab(event, 'profile-tab')">🛡️ Step 1: Mission Profile</button>
                <button class="tab-btn" onclick="openTab(event, 'chat-tab')">💬 Step 2: Tactical Dashboard</button>
            </div>

            <!-- TAB 1: MISSION PROFILE -->
            <div id="profile-tab" class="tab-content active">
                <div class="input-form-card" style="max-width: 800px; margin: 0 auto; min-height: auto;">
                    <h2 style="color: var(--success-color); margin-bottom: 1.5rem;">Configure Personnel Metrics</h2>
                    <p style="margin-bottom: 2rem; color: var(--text-muted-color);">Define your clearance and credentials to ground the AI's logic.</p>
                    
                    <div class="form-group">
                        <label>Clearance Level</label>
                        <select id="clearance" style="width: 100%; padding: 0.8rem; background: var(--background-color); color: white; border: 1px solid #2a4162; border-radius: 5px; font-family: var(--font-family);">
                            <option value="Secret">Secret</option>
                            <option value="TS/SCI">TS/SCI</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Existing Certifications</label>
                        <input type="text" id="certs" placeholder="e.g. Sec+, A+, Network+" value="Sec+">
                    </div>

                    <div class="form-group">
                        <label>Local Unit Context (Optional)</label>
